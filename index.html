<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoTeSy IT Services Training</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>CoTeSy IT Services</h1>
<p>Online Computer Training Academy</p>
</header>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('register')">Register</button>
<button onclick="show('login')">Login</button>
<button onclick="show('students')">Students</button>
</nav>

<section id="home">
<h2>Welcome</h2>
<p>CoTeSy Online Computer Training System</p>
</section>

<section id="register" class="hide">
<h2>Student Registration</h2>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<select id="course">
<option>Computer Basics</option>
<option>Microsoft Word</option>
<option>Microsoft Excel</option>
<option>PowerPoint</option>
</select>

<button onclick="register()">Register Student</button>

<p id="regmsg"></p>
</section>

<section id="login" class="hide">

<h2>Student Login</h2>

<input id="logemail" placeholder="Email">
<input id="logpass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="loginmsg"></p>

</section>

<section id="students" class="hide">

<h2>Registered Students</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Course</th>
</tr>
</thead>

<tbody id="studentTable"></tbody>

</table>

</section>

<script src="script.js"></script>

</body>
</html>
