<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoTeSy IT Services | Training Portal</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- LOGIN PAGE -->

<div id="loginPage" class="page active">

<div class="login-card">

<img src="cotesy-logo.png" class="login-logo">

<h2>CoTeSy IT Services</h2>
<p>Student Training Portal</p>

<input id="loginEmail" type="email" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">

<button id="loginBtn">Login</button>

<div id="loginMessage"></div>

</div>

</div>


<!-- APP -->

<div id="appShell" class="hidden">

<header class="hero">

<div class="container hero-inner">

<div class="brand">

<img src="cotesy-logo.png" class="brand-logo-img">

<div>
<h1>CoTeSy IT Services</h1>
<p>Online Computer Training Academy</p>
</div>

</div>

</div>

</header>


<nav class="nav">

<button class="nav-btn" data-section="home">Home</button>
<button class="nav-btn" data-section="courses">Courses</button>
<button class="nav-btn" data-section="portal">Portal</button>
<button class="nav-btn admin-only" data-section="admin">Admin</button>
<button id="logoutBtn">Logout</button>

</nav>


<main class="container">

<section id="home" class="page active">

<h2>Welcome to CoTeSy Training</h2>

</section>


<section id="courses" class="page">

<h2>Courses</h2>

<div id="courseGrid"></div>

</section>


<section id="portal" class="page">

<h2>Student Portal</h2>

<div id="portalContent"></div>

</section>


<section id="admin" class="page">

<h2>Admin Dashboard</h2>

<table>

<thead>

<tr>
<th>Name</th>
<th>Email</th>
<th>Course</th>
<th>Score</th>
</tr>

</thead>

<tbody id="adminTableBody"></tbody>

</table>

</section>


<section id="certificates" class="page">

<div id="certificateArea" class="certificate">

<img src="cotesy-logo.png" class="cert-logo">

<h2>Certificate of Completion</h2>

<p>This certifies that</p>

<h1 id="certStudentName">Student Name</h1>

<p>Completed</p>

<h3 id="certCourse">Course</h3>

</div>

<button onclick="window.print()">Download Certificate</button>

</section>

</main>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
